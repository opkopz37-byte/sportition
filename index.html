<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportition - Next.js Application</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      color: #ffffff;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 48px 32px;
      backdrop-filter: blur(10px);
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3B82F6, #10B981);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
    }

    h1 {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #3B82F6, #10B981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .code {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 16px;
      margin: 24px 0;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      color: #10B981;
      text-align: left;
    }

    .warning {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 24px;
      color: #FCD34D;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1>Sportition Next.js</h1>
    <p>
      이 프로젝트는 Next.js로 변환되었습니다.<br>
      개발 서버를 실행하여 접속해주세요.
    </p>
    
    <div class="code">
      # 터미널에서 실행:<br>
      npm run dev<br><br>
      # 그 다음 브라우저에서:<br>
      http://localhost:3000
    </div>

    <div class="warning">
      <span class="icon">⚠️</span>
      <span>이 HTML 파일을 직접 열지 마세요. 위의 명령어로 개발 서버를 실행해주세요.</span>
    </div>
  </div>

  <script>
    // 자동으로 개발 서버 확인
    fetch('http://localhost:3000')
      .then(() => {
        const shouldRedirect = confirm('개발 서버가 실행 중입니다. 자동으로 이동하시겠습니까?');
        if (shouldRedirect) {
          window.location.href = 'http://localhost:3000';
        }
      })
      .catch(() => {
        fetch('http://localhost:3001')
          .then(() => {
            const shouldRedirect = confirm('개발 서버가 포트 3001에서 실행 중입니다. 자동으로 이동하시겠습니까?');
            if (shouldRedirect) {
              window.location.href = 'http://localhost:3001';
            }
          })
          .catch(() => {});
      });
  </script>
</body>
</html>
